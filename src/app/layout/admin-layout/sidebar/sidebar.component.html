<!-- sidebar.component.html -->
<aside 
  class="admin-sidebar" 
  [class.toggled]="isToggled" 
  [class.mobile-view]="isMobileView"
>
  <div class="sidebar-brand" *ngIf="!isToggled">
    <h2>Admin Panel</h2>
  </div>
  <ul class="sidebar-nav">
    <li *ngFor="let item of menuItems">
      <a 
        [routerLink]="item.route" 
        routerLinkActive="active"
        [class.icon-only]="isToggled"
      >
        <i class="{{ item.icon }}"></i>
        <span *ngIf="!isToggled">{{ item.label }}</span>
      </a>
    </li>
  </ul>
</aside>
