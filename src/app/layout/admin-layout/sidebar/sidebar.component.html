<!-- sidebar.component.html -->
<aside class="admin-sidebar">
  <div class="sidebar-brand">
    <h2>Admin Panel</h2>
  </div>
  <ul class="sidebar-nav">
    <li *ngFor="let item of menuItems">
      <a 
        [routerLink]="item.route" 
        routerLinkActive="active"
      >
        <i class="fa {{ item.icon }}"></i> 
        {{ item.label }}
      </a>
    </li>
  </ul>
</aside>
