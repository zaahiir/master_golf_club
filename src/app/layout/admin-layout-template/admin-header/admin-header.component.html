<!-- header.component.html -->
<nav class="admin-header shadow-sm d-flex align-items-center justify-content-between ps-2 pe-3">
  <div class="header-left d-flex align-items-center">
    <button
      class="btn sidebar-toggle"
      (click)="onToggleSidebar()"
      style="color: #104e39;"
    >
      <fa-icon [icon]="faBars"></fa-icon>
    </button>
  </div>
  <div class="header-actions d-flex align-items-center gap-3">
    <button class="btn notification-btn position-relative">
      <fa-icon [icon]="faBell"></fa-icon>
      <span class="badge bg-danger position-absolute top-0 start-100 translate-middle">3</span>
    </button>
    <div class="profile-section dropdown">
      <div
        class="d-flex align-items-center gap-2"
        (click)="toggleUserDropdown()"
      >
        <img src="../../../../assets/images/member-avatar.jpg" alt="Profile" class="avatar rounded-circle">
        <span class="username d-none d-md-inline">John Doe</span>
      </div>
      <ul
        class="dropdown-menu"
        [ngClass]="{'show': isUserDropdownOpen}"
      >
        <li><a class="dropdown-item" href="#">Profile</a></li>
        <li><a class="dropdown-item" href="#">Settings</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item"  routerLink="/admin/logout">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>
