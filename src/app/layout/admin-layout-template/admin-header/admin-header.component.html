<!-- header.component.html -->
<nav class="admin-header bg-white shadow-sm d-flex align-items-center justify-content-between">
  <div class="header-left d-flex align-items-center">
    <button 
      class="btn btn-outline-success sidebar-toggle" 
      (click)="onToggleSidebar()"
      [style.color]="'#104e39'"
    >
      <fa-icon [icon]="faBars"></fa-icon>
    </button>
  </div>
  <div class="header-actions d-flex align-items-center gap-3">
    <button class="btn btn-light notification-btn position-relative">
      <fa-icon [icon]="faBell"></fa-icon>
      <span class="badge bg-danger position-absolute top-0 start-100 translate-middle">3</span>
    </button>
    <div class="profile-section d-flex align-items-center gap-2">
      <img src="assets/avatar.png" alt="Profile" class="avatar rounded-circle">
      <span class="username d-none d-md-inline">John Doe</span>
      <fa-icon [icon]="faUser"></fa-icon>
    </div>
  </div>
</nav>
