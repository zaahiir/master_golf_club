<div class="home container-fluid p-0 d-flex flex-column align-items-center">
    <!-- Background Image -->
    <div class="home-image mb-4 d-flex justify-content-center align-items-center">
        <h1 class="welcome-text">Welcome to Our Destination</h1>
    </div>
  
    <!-- Card Section -->
    <div class="container-fluid page-content d-flex justify-content-between">
      <div *ngFor="let card of cards" class="card landscape">
        <div class="content">
          <h2 class="title">{{ card.title }}</h2>
          <p class="copy">{{ card.description }}</p>
          <button class="btn">{{ card.buttonText }}</button>
        </div>
      </div>
    </div>
  
    <!-- Carousel Section -->
    <div class="carousel-container my-4">
        <h1>Latest Blog</h1>
      <div id="golfCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item" *ngFor="let image of carouselImages; let i = index" [class.active]="i === 0">
            <img [src]="image" class="d-block w-100" alt="Carousel Image" />
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#golfCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#golfCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    </div>
  </div>
