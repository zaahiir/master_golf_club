<div class="home container-fluid p-0 d-flex flex-column align-items-center">
    <!-- Background Image -->
    <div class="home-image mb-4"></div>
  
    <!-- Three Cards Section -->
    <div class="card-container row my-4">
      <div class="col-md-4" *ngFor="let card of cards">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">{{ card.title }}</h5>
            <p class="card-text">{{ card.description }}</p>
            <a href="#" class="btn btn-primary">{{ card.buttonText }}</a>
          </div>
        </div>
      </div>
    </div>
  
    <!-- Carousel Section -->
    <div class="carousel-container my-4">
      <div id="golfCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item" *ngFor="let image of carouselImages; let i = index" [class.active]="i === 0">
            <img [src]="image" class="d-block w-100" alt="Carousel Image" />
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#golfCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#golfCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    </div>
  </div>
