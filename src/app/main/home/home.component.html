<div class="home container-fluid p-0 d-flex flex-column align-items-center">
    <!-- Background Image -->
    <div class="home-image mb-4"></div>
  
    <!-- Card Section -->
    <div class="page-content">
      <div class="card landscape">
        <div class="content">
          <h2 class="title">Landscape Destination 1</h2>
          <p class="copy">Explore our beautiful landscape destinations.</p>
          <button class="btn">View Trips</button>
        </div>
      </div>
      <div class="card landscape">
        <div class="content">
          <h2 class="title">Landscape Destination 2</h2>
          <p class="copy">Explore our beautiful landscape destinations.</p>
          <button class="btn">View Trips</button>
        </div>
      </div>
      <div class="card landscape">
        <div class="content">
          <h2 class="title">Landscape Destination 3</h2>
          <p class="copy">Explore our beautiful landscape destinations.</p>
          <button class="btn">View Trips</button>
        </div>
      </div>
    </div>
  
    <!-- Carousel Section -->
    <div class="carousel-container my-4">
      <div id="golfCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item" *ngFor="let image of carouselImages; let i = index" [class.active]="i === 0">
            <img [src]="image" class="d-block w-100" alt="Carousel Image" />
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#golfCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#golfCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    </div>
  </div>
