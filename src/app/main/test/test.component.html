<div class="container">
    <div class="amenities-grid">
        <div class="amenity-card" *ngFor="let amenity of amenities" [title]="amenity.tooltip" [attr.data-id]="amenity.id">
            <div class="icon">
                <fa-icon [icon]="amenity.icon"></fa-icon>
            </div>
            <div class="amenity-info">
                <p>{{ amenity.title }}</p>
            </div>
        </div>
    </div>
</div>
