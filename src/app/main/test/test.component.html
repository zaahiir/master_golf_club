<div class="sidebar">
    <div
      class="amenity-item"
      *ngFor="let amenity of amenities"
      [attr.title]="amenity.tooltip" 
      data-bs-toggle="tooltip"       
      data-bs-placement="top"     
    >
      <fa-icon
        [icon]="amenity.icon"
        class="animated-icon"
      ></fa-icon>
      <span class="amenity-title">{{ amenity.title }}</span>
    </div>
  </div>
